name: Build, Push and Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Create app directory
            mkdir -p ~/shootingcenter
            cd ~/shootingcenter
            
            # Create docker-compose file
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              frontend:
                image: ghcr.io/dajtvoxdev/shootingcenter-frontend:latest
                container_name: shootingcenter-frontend
                ports:
                  - "80:80"
                restart: unless-stopped
                depends_on:
                  - backend
                networks:
                  - shootingcenter-network
            
              backend:
                image: ghcr.io/dajtvoxdev/shootingcenter-backend:latest
                container_name: shootingcenter-backend
                ports:
                  - "3001:3001"
                environment:
                  - NODE_ENV=production
                  - PORT=3001
                volumes:
                  - ./backend-data:/app/data
                  - ./backend-uploads:/app/public/uploads
                restart: unless-stopped
                networks:
                  - shootingcenter-network
            
            networks:
              shootingcenter-network:
                driver: bridge
            EOF
            
            # Pull and deploy
            sudo docker compose pull
            sudo docker compose up -d
            
            # Cleanup
            sudo docker system prune -f
            
            echo "✅ Deployment completed!"
