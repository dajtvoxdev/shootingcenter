name: Build, Push and Deploy to VPS

on:
  push:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Create app directory
            mkdir -p ~/shootingcenter
            cd ~/shootingcenter
            
            # Create Caddyfile for SSL and reverse proxy
            cat > Caddyfile << 'EOF'
            shootingcenter.click {
                @api {
                    path /api/*
                }
                
                handle @api {
                    uri strip_prefix /api
                    reverse_proxy backend:3001 {
                        header_up Host {host}
                        header_up X-Real-IP {remote}
                        header_up X-Forwarded-For {remote}
                        header_up X-Forwarded-Proto {scheme}
                    }
                }
                
                reverse_proxy frontend:80 {
                    header_up Host {host}
                    header_up X-Real-IP {remote}
                    header_up X-Forwarded-For {remote}
                    header_up X-Forwarded-Proto {scheme}
                }
            }
            
            www.shootingcenter.click {
                redir https://shootingcenter.click{uri}
            }
            EOF
            
            # Create docker-compose file for production
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              caddy:
                image: caddy:2-alpine
                container_name: shootingcenter-caddy
                ports:
                  - "80:80"
                  - "443:443"
                  - "443:443/udp"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile
                  - caddy_data:/data
                  - caddy_config:/config
                restart: unless-stopped
                depends_on:
                  - frontend
                  - backend
                networks:
                  - shootingcenter-network
            
              frontend:
                image: ghcr.io/dajtvoxdev/shootingcenter-frontend:latest
                container_name: shootingcenter-frontend
                expose:
                  - "80"
                restart: unless-stopped
                networks:
                  - shootingcenter-network
            
              backend:
                image: ghcr.io/dajtvoxdev/shootingcenter-backend:latest
                container_name: shootingcenter-backend
                expose:
                  - "3001"
                environment:
                  - NODE_ENV=production
                  - PORT=3001
                  - CORS_ORIGIN=https://shootingcenter.click,http://34.124.192.94
                volumes:
                  - ./backend-data:/app/data
                  - ./backend-uploads:/app/public/uploads
                restart: unless-stopped
                networks:
                  - shootingcenter-network
                healthcheck:
                  test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
            
            volumes:
              caddy_data:
              caddy_config:
            
            networks:
              shootingcenter-network:
                driver: bridge
            EOF
            
            # Pull and deploy
            sudo docker compose pull
            sudo docker compose up -d
            
            # Wait for Caddy to obtain SSL certificate
            echo "⏳ Waiting for SSL certificate..."
            sleep 10
            
            # Show status
            sudo docker ps
            
            # Cleanup
            sudo docker system prune -f
            
            echo "✅ Deployment completed!"
            echo "🌐 Website: https://shootingcenter.click"
            echo "🔌 API: https://shootingcenter.click/api/"
