version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: shootingcenter-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks:
      - shootingcenter-network

  frontend:
    image: ghcr.io/dajtvoxdev/shootingcenter-frontend:latest
    container_name: shootingcenter-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - shootingcenter-network

  backend:
    image: ghcr.io/dajtvoxdev/shootingcenter-backend:latest
    container_name: shootingcenter-backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=https://shootingcenter.click
    volumes:
      - ./backend-data:/app/data
      - ./backend-uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - shootingcenter-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  caddy_data:
  caddy_config:

networks:
  shootingcenter-network:
    driver: bridge
